{% extends "base.html" %}
{% load uistrings %}

{% block title %}{% ui "gateway.stock.title" %}{% endblock %}

{% block content %}
<div class="card">
    <h1>{% ui "gateway.stock.title" %}</h1>
    <p class="text-muted">{% ui "gateway.stock.description" %}</p>

    <div style="display:flex; gap: var(--spacing-sm); align-items:center; margin: var(--spacing-md) 0;">
        <button id="btn-stock" class="button">{% ui "gateway.stock.button" %}</button>
        <input id="search-input" type="search" placeholder="{% ui 'gateway.stock.search_placeholder' %}" style="max-width: 260px;">
    </div>
    <p id="stock-error" style="color: var(--color-danger); display: none;"></p>

    <table id="stock-table" style="width: 100%; margin-top: var(--spacing-md); border-collapse: collapse; display: none;">
        <thead>
            <tr>
                <th style="text-align:left; border-bottom: 1px solid var(--color-border); padding: var(--spacing-sm);">Artículo</th>
                <th style="text-align:left; border-bottom: 1px solid var(--color-border); padding: var(--spacing-sm);">Stock</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
let stockRows = [];

function renderRows(rows) {
    const tableEl = document.getElementById('stock-table');
    const tbody = tableEl.querySelector('tbody');
    tbody.innerHTML = '';
    for (const row of rows) {
        const tr = document.createElement('tr');
        tr.innerHTML =
            '<td style="padding: var(--spacing-sm); border-bottom: 1px solid var(--color-border);">' + row.idArticulo + '</td>' +
            '<td style="padding: var(--spacing-sm); border-bottom: 1px solid var(--color-border);">' + row.Suma_Stock + '</td>';
        tbody.appendChild(tr);
    }
    tableEl.style.display = rows.length ? 'table' : 'none';
}

document.getElementById('search-input').addEventListener('input', function () {
    const term = this.value.trim().toUpperCase();
    const filtered = term
        ? stockRows.filter((row) => String(row.idArticulo).toUpperCase().includes(term))
        : stockRows;
    renderRows(filtered);
});

document.getElementById('btn-stock').addEventListener('click', async function () {
    const button = this;
    const errorEl = document.getElementById('stock-error');
    const tableEl = document.getElementById('stock-table');

    button.disabled = true;
    errorEl.style.display = 'none';
    tableEl.style.display = 'none';

    try {
        const response = await fetch("{% url 'gateway:stock_actual_api' %}");
        const data = await response.json();

        if (!response.ok) {
            errorEl.textContent = '{% ui "gateway.stock.error_prefix" %}: ' + (data.error || response.status);
            errorEl.style.display = 'block';
            return;
        }

        stockRows = data.rows;
        document.getElementById('search-input').value = '';
        renderRows(stockRows);
    } catch (err) {
        errorEl.textContent = '{% ui "gateway.stock.error_prefix" %}: ' + err;
        errorEl.style.display = 'block';
    } finally {
        button.disabled = false;
    }
});
</script>
{% endblock %}
