{% extends "base.html" %}
{% load uistrings %}

{% block title %}{% ui "gateway.stock.title" %}{% endblock %}

{% block content %}
<div class="card warehouse-view">
    <h1>{% ui "gateway.stock.title" %}</h1>
    <p class="text-muted">{% ui "gateway.stock.description" %}</p>

    <div style="display:flex; gap: var(--spacing-sm); align-items:center; flex-wrap: wrap; margin: var(--spacing-md) 0;">
        <button id="btn-stock" class="button">{% ui "gateway.stock.button" %}</button>
        <input id="search-input" type="search" placeholder="{% ui 'gateway.stock.search_placeholder' %}" style="max-width: 320px;">
        <a id="btn-export" class="button" style="background: var(--color-brand-black); text-decoration: none; margin-left: auto;" href="{% url 'gateway:stock_export' %}">{% ui "gateway.stock.export_button" %}</a>
    </div>
    <p id="stock-error" style="color: var(--color-danger); display: none;"></p>

    <div style="overflow-x: auto;">
        <table id="stock-table" style="width: 100%; margin-top: var(--spacing-md); border-collapse: collapse; display: none; white-space: nowrap;">
            <thead><tr></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
let stockRows = [];

function celda(valor) {
    return valor === null || valor === undefined ? '' : valor;
}

function pintarCabecera(columnas) {
    const thead = document.querySelector('#stock-table thead tr');
    thead.innerHTML = columnas.map(
        (c) => '<th style="text-align:left; border-bottom: 1px solid var(--color-border); padding: var(--spacing-sm);">' + c.replace(/_/g, ' ') + '</th>'
    ).join('');
}

function pintarFilas(filas, columnas) {
    const tbody = document.querySelector('#stock-table tbody');
    tbody.innerHTML = filas.map((fila) =>
        '<tr>' + columnas.map(
            (c) => '<td style="padding: var(--spacing-sm); border-bottom: 1px solid var(--color-border);">' + celda(fila[c]) + '</td>'
        ).join('') + '</tr>'
    ).join('');
    document.getElementById('stock-table').style.display = filas.length ? 'table' : 'none';
}

function aplicarFiltro() {
    if (!stockRows.length) return;
    const columnas = Object.keys(stockRows[0]);
    const term = document.getElementById('search-input').value.trim().toUpperCase();
    const filtradas = term
        ? stockRows.filter((row) => String(row.idArticulo || '').toUpperCase().includes(term))
        : stockRows;
    pintarFilas(filtradas, columnas);
}

document.getElementById('search-input').addEventListener('input', aplicarFiltro);

document.getElementById('btn-stock').addEventListener('click', async function () {
    const button = this;
    const errorEl = document.getElementById('stock-error');

    button.disabled = true;
    errorEl.style.display = 'none';

    try {
        const response = await fetch("{% url 'gateway:stock_actual_api' %}");
        const data = await response.json();

        if (!response.ok) {
            errorEl.textContent = '{% ui "gateway.stock.error_prefix" %}: ' + (data.error || response.status);
            errorEl.style.display = 'block';
            return;
        }

        stockRows = data.rows;
        document.getElementById('search-input').value = '';
        if (stockRows.length) {
            pintarCabecera(Object.keys(stockRows[0]));
        }
        aplicarFiltro();
    } catch (err) {
        errorEl.textContent = '{% ui "gateway.stock.error_prefix" %}: ' + err;
        errorEl.style.display = 'block';
    } finally {
        button.disabled = false;
    }
});
</script>
{% endblock %}
