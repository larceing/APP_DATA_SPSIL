{% extends "admin/change_form.html" %}

{% block after_field_sets %}
{{ block.super }}
<div class="module aligned" style="margin-top: 20px;">
    <h2>Cambiar entorno activo</h2>
    <p class="help">Entorno actual: <strong>{{ current_environment }}</strong></p>
    <div style="display:flex; gap:10px; margin-top:10px;">
        {% for value, label in environment_choices %}
        <form method="post" action="{% url 'core:switch_environment' %}">
            {% csrf_token %}
            <input type="hidden" name="environment" value="{{ value }}">
            <input type="hidden" name="next" value="{{ request.path }}">
            <button type="submit" class="button" {% if value == current_environment %}disabled{% endif %}>
                {{ label }}
            </button>
        </form>
        {% endfor %}
    </div>
</div>
{% endblock %}
